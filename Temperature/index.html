<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Temperature</title>

</head>
<body>
<script>
 function Temperature(celsius) {
    if (celsius < -273) {
        this.celsius = -273;
    } else {
        this.celsius = celsius;
    }
    this.toFahrenheit = function(){
        return this.celsius *9 / 5+ 32;
    }
    this.toKelvin = function(){
        return this.celsius +273.15;
    }
   }
   let temp = new Temperature(25);


document.write("Nhiệt độ Celsius: " + temp.celsius + "°C<br>");
document.write("Nhiệt độ Fahrenheit: " + temp.toFahrenheit() + "°F<br>");
document.write("Nhiệt độ Kelvin: " + temp.toKelvin() + " K");

</script>

</body>
</html>
