<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Game</title>
    <style>
        body{
            text-align: center;
            font-family: Arial;
        }

        canvas{
            border: 2px solid black;
            background: lightgray;
        }
    </style>
</head>

<h2>Car Game</h2>
<p>
    Điều khiển:
    ⬆️⬇️⬅️➡️ Di chuyển |
    Ctrl: Tăng tốc |
    Space: Chơi lại khi Game Over
</p>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

class Car{
    constructor(x,y){
        this.x = x;
        this.y = y;
        this.width = 40;
        this.height = 60;
        this.speed = 2;
        this.direction = "up";
    }

    move(){

        switch(this.direction){
            case "up":
                this.y -= this.speed;
                break;

            case "down":
                this.y += this.speed;
                break;

            case "left":
                this.x -= this.speed;
                break;

            case "right":
                this.x += this.speed;
                break;
        }

        if(this.x < 0)
            this.x = 0;

        if(this.y < 0)
            this.y = 0;

        if(this.x + this.width > canvas.width)
            this.x = canvas.width - this.width;

        if(this.y + this.height > canvas.height)
            this.y = canvas.height - this.height;
    }

    draw(){
        ctx.fillStyle = "blue";
        ctx.fillRect(
            this.x,
            this.y,
            this.width,
            this.height
        );
    }
}

class Obstacle{
    constructor(x,y){
        this.x = x;
        this.y = y;
        this.width = 40;
        this.height = 40;
    }

    draw(){
        ctx.fillStyle = "red";
        ctx.fillRect(
            this.x,
            this.y,
            this.width,
            this.height
        );
    }
}

class Reward{
    constructor(x,y){
        this.x = x;
        this.y = y;
        this.size = 20;
    }

    draw(){
        ctx.fillStyle = "gold";
        ctx.beginPath();
        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI * 2
        );
        ctx.fill();
    }
}

let car;
let obstacles;
let rewards;
let score;
let gameOver;

function resetGame(){

    car = new Car(380,500);

    obstacles = [];
    rewards = [];

    score = 0;
    gameOver = false;

    for(let i=0;i<8;i++){

        obstacles.push(
            new Obstacle(
                Math.random()*750,
                Math.random()*550
            )
        );

        rewards.push(
            new Reward(
                Math.random()*750,
                Math.random()*550
            )
        );
    }

    gameLoop();
}

resetGame();

document.addEventListener("keydown",function(e){

    if(gameOver && e.code=="Space"){
        resetGame();
        return;
    }

    if(e.key=="ArrowUp")
        car.direction="up";

    if(e.key=="ArrowDown")
        car.direction="down";

    if(e.key=="ArrowLeft")
        car.direction="left";

    if(e.key=="ArrowRight")
        car.direction="right";

    if(e.key=="Control")
        car.speed=5;

});

document.addEventListener("keyup",function(e){

    if(e.key=="Control")
        car.speed=2;

});

function collision(a,b){

    return(
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
    );

}

function checkObstacle(){

    for(let obstacle of obstacles){

        if(collision(car,obstacle)){
            gameOver = true;
        }

    }

}

function checkReward(){

    for(let i=rewards.length-1;i>=0;i--){

        let reward = rewards[i];

        if(
            car.x < reward.x + reward.size &&
            car.x + car.width > reward.x &&
            car.y < reward.y + reward.size &&
            car.y + car.height > reward.y
        ){

            score += 10;

            rewards.splice(i,1);

        }

    }

}

function drawScore(){

    ctx.fillStyle="black";
    ctx.font="25px Arial";
    ctx.fillText(
        "Score: " + score,
        20,
        30
    );

}

function gameLoop(){

    if(gameOver){

        ctx.clearRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        ctx.fillStyle="red";
        ctx.font="50px Arial";
        ctx.fillText(
            "GAME OVER",
            180,
            250
        );

        ctx.fillStyle="black";
        ctx.font="30px Arial";
        ctx.fillText(
            "Score: " + score,
            300,
            320
        );

        ctx.font="25px Arial";
        ctx.fillText(
            "Nhan SPACE de choi lai",
            210,
            380
        );

        return;
    }

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    car.move();

    checkObstacle();
    checkReward();

    car.draw();

    for(let obstacle of obstacles){
        obstacle.draw();
    }

    for(let reward of rewards){
        reward.draw();
    }

    drawScore();

    requestAnimationFrame(gameLoop);

}

</script>

</body>
</html>
